<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(10, 86, 10, 0.874);
        }
        img{
            width: 200px;
            border: 1px ridge black;
        }
        .buton{
            color: rgb(207, 17, 17);
            cursor: pointer;
        }
        .buton:hover + .menu,
        .buton:focus+.menu{
            display: block;
            position:relative;
            right: -1em;
            
        }
        nav{
            display: none;
        }
        main{
            display: flex;
            justify-content: space-around;
            align-items: center;

        }
        .caixa{
            padding: 5px;
            margin: 5px;
            border: 2px solid black;
            position: relative;
            flex-grow: 1;

        }
        footer{
            background-color: black;
            color: white;
            position: fixed;
            width: 100%;
            text-align: center;
        }
        @media (max-width: 600px){
            main{
                display: flex;
                flex-direction: column;
                flex-wrap: nowrap;
                justify-content: center;
                align-items: center;
            }
            .caixa{
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="#" alt="logotipo" id="logo"><br>
         <button class="buton">Menu</button>
        <nav class="menu">
           <a href="#">linha</a><br>
           <a href="#">linha</a><br>
           <a href="#">linha</a><br>
        </nav>
    </header>
    <main>
        <div class="caixa">
            <h2>Repertorio</h2>
            <img src="#" alt="img">
        </div>
        <div class="caixa">
            <h2>Responsivo</h2>
            <img src="#" alt="img">
        </div>
    </main>
    <footer>
        &copy;Diego
    </footer>
</body>
</html>
